spring.application.name=petpass

# configurações de conexão com o MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/petpass_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=sua_senha_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# configurações do JPA/Hibernate
# o "update" faz o Spring criar ou atualizar as tabelas automaticamente com base nos models
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
